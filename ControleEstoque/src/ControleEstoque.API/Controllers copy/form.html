<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - Forma de Pagamento</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <header>
        <h1>Nova/Editar Forma de Pagamento</h1>
        <nav>
            <a href="index.html">Voltar para a Lista</a>
        </nav>
    </header>
    <main>
        <form id="formaPagamentoForm">
            <!-- ID Oculto para identificar se é edição -->
            <input type="hidden" id="id">
            
            <div class="form-group">
                <label for="nome">Nome da Forma de Pagamento</label>
                <input type="text" id="nome" required placeholder="Ex: Cartão de Crédito">
            </div>

            <div class="form-group">
                <label for="ativo">Status</label>
                <select id="ativo" required>
                    <option value="true">Ativo</option>
                    <option value="false">Inativo</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-success">Salvar</button>
        </form>
    </main>
    <script src="../../js/config.js"></script>
    <script src="../../js/formas_pagamento/form.js"></script>
</body>
</html>
